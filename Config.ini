SendEnter=1
SelectApp=1

[MenuItem7]
Name=翻译成英文
Content=将以下内容翻译成英文，务必准确，符合原内容上下文的场景，只输出翻译后的结果，不要输出其他信息，需翻译的内容如下：{text}
NewChat=1
SendEnter=1
SelectApp=

[MenuItem8]
Name=翻译成中文
Content=将以下内容翻译成中文，务必准确，符合原内容上下文的场景，只输出翻译后的结果，不要输出其他信息，需翻译的内容如下：{text}
NewChat=1
SendEnter=1
SelectApp=

[MenuItem9]
Name=对照翻译
Content=将以下内容翻译成中文/英文，务必准确，符合原内容上下文的场景，输出格式：每个段落的原文+对应的译文，除原文和译文之外不需要输出其他内容，直至将所有的段落都输出；特殊情况处理：如果需翻译内容段落感不清晰，则先按上下文理解分为多个段落；如果需翻译内容较短，则不需要分段落；需翻译的内容如下：{text}
NewChat=1
SendEnter=1
SelectApp=

[MenuItem10]
Name=总结要点
Content=提炼核心内容，总结为简洁且直至内核的几句话，格式为分点标题+必要且简洁的概述，一定要简练，内容如下：{text}
NewChat=1
SendEnter=1
SelectApp=

[MenuItem11]
Name=需求理解及输出
Content=深入理解并分析文本内容，按指定格式输出：#输出格式（每一点换行）1.需求标题：简短，概况主要需求内容；2.优先级：P1/2/3，你根据文本内容以及对业务的影响进行判断；3.需求内容：需求解决的问题、需求的实现方式；4.需求场景：真实的需求场景相关内容；#文本内容：{text}
NewChat=1
SendEnter=1
SelectApp=

